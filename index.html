<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f172a" />
<title>4c1z</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{
    --bg:#f4efe3; --card:#fffdf7; --card2:#efe9da; --line:#d8d0bd;
    --txt:#14224a; --dim:#46527a; --accent:#14224a; --accent2:#ffd166;
    --good:#1f7a52; --bad:#b00020;
  }
  html,body{margin:0;padding:0;background:
    radial-gradient(1200px 600px at 50% -10%, #ffffff 0%, var(--bg) 55%);
    color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    min-height:100vh;font-size:16px;line-height:1.5;}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 40px;}

  header{text-align:center;padding:14px 0 6px;}
  header h1{margin:0;font-size:30px;letter-spacing:-.02em;}
  header p{margin:6px 0 0;color:var(--dim);font-size:14px;}

  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:16px;}
  label.tt{display:block;font-size:13px;color:var(--dim);margin:0 0 8px;}
  .inrow{display:flex;gap:8px;}
  #alan{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:13px 14px;font-size:16px;outline:none;}
  #alan:focus{border-color:var(--accent);}
  .clearx{background:var(--card2);border:1px solid var(--line);color:var(--dim);
    border-radius:12px;padding:0 14px;font-size:16px;cursor:pointer;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .chip{background:var(--card2);border:1px solid var(--line);color:var(--dim);
    border-radius:999px;padding:7px 13px;font-size:13px;cursor:pointer;user-select:none;}
  .chip:active{transform:scale(.96);}
  .chip.sinirsiz{border-color:var(--accent);color:var(--accent);}

  .gen{width:100%;margin-top:14px;border:0;border-radius:14px;padding:16px;
    font-size:18px;font-weight:700;color:var(--txt);cursor:pointer;
    background:linear-gradient(135deg,var(--accent2),#ffb347);
    box-shadow:0 8px 24px rgba(255,179,71,.25);}
  .gen:disabled{filter:grayscale(.5) brightness(.8);cursor:default;}
  .gen:active{transform:translateY(1px);}

  .tabs{display:flex;gap:8px;margin-top:16px;}
  .tab{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);
    color:var(--dim);border-radius:12px;padding:10px;font-size:14px;cursor:pointer;}
  .tab.on{color:var(--txt);border-color:var(--accent);background:var(--card2);}

  .status{margin-top:16px;text-align:center;color:var(--dim);font-size:14px;min-height:20px;}
  .spin{display:inline-block;width:18px;height:18px;border:3px solid var(--line);
    border-top-color:var(--accent2);border-radius:50%;animation:sp 1s linear infinite;vertical-align:-4px;margin-right:8px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .retry{margin-top:10px;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;margin-top:14px;animation:rise .4s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card h2{margin:0 0 2px;font-size:21px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;}
  .star{margin-left:auto;background:none;border:0;font-size:24px;cursor:pointer;line-height:1;filter:grayscale(1);opacity:.5;}
  .star.on{filter:none;opacity:1;}
  .ne{color:var(--dim);font-size:15px;margin:0 0 12px;}
  .dia{display:flex;flex-direction:column;gap:7px;margin:10px 0 6px;}
  .msg{max-width:88%;padding:8px 11px;border-radius:14px;font-size:14px;line-height:1.45;}
  .msg .who{display:block;font-size:11px;font-weight:700;margin-bottom:2px;opacity:.9;}
  .msg.zeyneb{align-self:flex-end;background:rgba(91,214,160,.12);border:1px solid rgba(91,214,160,.35);border-bottom-right-radius:4px;}
  .msg.zeyneb .who{color:var(--good);}
  .msg.cavus{align-self:flex-start;background:rgba(124,156,255,.12);border:1px solid rgba(124,156,255,.35);border-bottom-left-radius:4px;}
  .msg.cavus .who{color:var(--accent);}
  .field{margin-top:9px;font-size:14px;}
  .field b{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:1px;}
  .field.vaybe{background:rgba(124,156,255,.1);border:1px solid rgba(124,156,255,.3);
    border-radius:12px;padding:10px 12px;margin-top:12px;}
  .field.vaybe b{color:var(--accent);}
  .cardfoot{display:flex;gap:8px;margin-top:13px;}
  .mini{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--dim);
    border-radius:10px;padding:9px;font-size:13px;cursor:pointer;text-align:center;}
  .mini:active{transform:scale(.97);}

  .empty{text-align:center;color:var(--dim);font-size:14px;margin-top:28px;line-height:1.7;}
  footer{text-align:center;color:var(--dim);font-size:12px;margin-top:26px;}
  a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>4c1z</h1>
    <p>Dünyada ve Türkiye'de olmayan, basit, herkesin kullanacağı ürün fikirleri</p>
  </header>

  <div class="panel">
    <label class="tt" for="alan">Hangi alan? (boş = SINIRSIZ, her alandan karışık)</label>
    <div class="inrow">
      <input id="alan" placeholder="örn. mutfak, araba, çocuk… ya da boş bırak" autocomplete="off" />
      <button class="clearx" id="clear" title="Temizle">✕</button>
    </div>
    <div class="chips" id="chips">
      <span class="chip sinirsiz" data-v="">Sınırsız</span>
      <span class="chip" data-v="mutfak">Mutfak</span>
      <span class="chip" data-v="banyo">Banyo</span>
      <span class="chip" data-v="çanta / cep">Çanta</span>
      <span class="chip" data-v="araba">Araba</span>
      <span class="chip" data-v="çocuk">Çocuk</span>
      <span class="chip" data-v="yaşlılar">Yaşlı</span>
      <span class="chip" data-v="sokak / dışarı">Sokak</span>
      <span class="chip" data-v="ev">Ev</span>
      <span class="chip" data-v="ofis / okul">Ofis</span>
      <span class="chip" data-v="bahçe / balkon">Bahçe</span>
      <span class="chip" data-v="evcil hayvan">Evcil</span>
    </div>
    <button class="gen" id="gen">Fikir Üret</button>
  </div>

  <div class="tabs">
    <div class="tab on" id="tabYeni">Yeni Fikirler</div>
    <div class="tab" id="tabKayit">Kayıtlılar (<span id="kayitSay">0</span>)</div>
  </div>

  <div class="status" id="status"></div>
  <div id="out"></div>

  <footer>
    Fikirler internetteki ücretsiz yapay zekadan canlı üretilir.<br/>
    Tamamen ücretsiz · anahtar gerekmez.
  </footer>
</div>

<script>
const ENDPOINT = "https://text.pollinations.ai/";
const $ = s => document.querySelector(s);
const out = $("#out"), statusEl = $("#status");
const alanInput = $("#alan");

let mod = "yeni";              // "yeni" | "kayit"
let sonUretilen = [];          // ekrandaki son üretim
let uretilmisIsimler = [];     // tekrar engelleme (oturum)
const FAV_KEY = "mucit_favoriler";

function favleriYukle(){ try{ return JSON.parse(localStorage.getItem(FAV_KEY)) || []; }catch(e){ return []; } }
function favleriKaydet(a){ localStorage.setItem(FAV_KEY, JSON.stringify(a)); $("#kayitSay").textContent = a.length; }
function favMi(isim){ return favleriYukle().some(f => f.isim === isim); }

function favToggle(fikir){
  let a = favleriYukle();
  if(a.some(f => f.isim === fikir.isim)) a = a.filter(f => f.isim !== fikir.isim);
  else a.unshift(fikir);
  favleriKaydet(a);
  if(mod === "kayit") cizKayitlilar();
}

// ---- chips & input ----
$("#chips").addEventListener("click", e => {
  const c = e.target.closest(".chip"); if(!c) return;
  alanInput.value = c.dataset.v;
});
$("#clear").addEventListener("click", () => { alanInput.value = ""; alanInput.focus(); });

// ---- tabs ----
$("#tabYeni").addEventListener("click", () => setMod("yeni"));
$("#tabKayit").addEventListener("click", () => setMod("kayit"));
function setMod(m){
  mod = m;
  $("#tabYeni").classList.toggle("on", m === "yeni");
  $("#tabKayit").classList.toggle("on", m === "kayit");
  if(m === "kayit") cizKayitlilar();
  else { statusEl.textContent = ""; cizFikirler(sonUretilen); }
}

// ---- kart çizimi ----
function diyalogHTML(d){
  if(!Array.isArray(d) || !d.length) return "";
  const satir = m => {
    const zeyneb = String(m.kim||"").toLocaleLowerCase("tr").startsWith("zeyneb");
    const ikon = zeyneb ? "🧕" : "🧔🏽";
    const kls = zeyneb ? "zeyneb" : "cavus";
    return `<div class="msg ${kls}"><span class="who">${ikon} ${escapeHtml(m.kim||"")}</span>${escapeHtml(m.soz||"")}</div>`;
  };
  return `<div class="dia">${d.map(satir).join("")}</div>`;
}
function kartHTML(f){
  const sec = (b, v) => v ? `<div class="field"><b>${b}</b>${escapeHtml(v)}</div>` : "";
  return `
    <h2>${escapeHtml(f.isim || "İsimsiz")}
      <button class="star ${favMi(f.isim) ? "on" : ""}" data-act="fav">☆</button>
    </h2>
    <p class="ne">${escapeHtml(f.ne || "")}</p>
    ${diyalogHTML(f.diyalog)}
    ${sec("Neyden", f.neyden)}
    ${sec("Hangi derde", f.derde)}
    ${sec("Neden hâlâ yok", f.nedenYok)}
    ${f.vayBe ? `<div class="field vaybe"><b>Vay be sebebi</b>${escapeHtml(f.vayBe)}</div>` : ""}
    <div class="cardfoot">
      <button class="mini" data-act="kopya">Kopyala</button>
    </div>`;
}
function fikirKart(f){
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = kartHTML(f);
  el.querySelector('[data-act="fav"]').addEventListener("click", ev => {
    favToggle(f); ev.currentTarget.classList.toggle("on");
  });
  el.querySelector('[data-act="kopya"]').addEventListener("click", () => kopyala(f));
  return el;
}
function cizFikirler(list){
  out.innerHTML = "";
  if(!list || !list.length){
    out.innerHTML = `<div class="empty">Yukarıdan bir alan seç (ya da boş bırak)<br/>ve <b>Fikir Üret</b>'e bas.</div>`;
    return;
  }
  list.forEach(f => out.appendChild(fikirKart(f)));
}
function cizKayitlilar(){
  statusEl.textContent = "";
  const a = favleriYukle();
  out.innerHTML = "";
  if(!a.length){ out.innerHTML = `<div class="empty">Henüz kaydın yok.<br/>Beğendiğin fikrin ☆ yıldızına bas.</div>`; return; }
  a.forEach(f => out.appendChild(fikirKart(f)));
}

function kopyala(f){
  const dia = Array.isArray(f.diyalog) && f.diyalog.length
    ? "\n\n" + f.diyalog.map(m => `${m.kim}: ${m.soz}`).join("\n") : "";
  const t = `${f.isim}\n${f.ne}${dia}\n\nNeyden: ${f.neyden}\nHangi derde: ${f.derde}\nNeden yok: ${f.nedenYok}\nVay be: ${f.vayBe}`;
  navigator.clipboard?.writeText(t).then(
    () => flash("Kopyalandı"),
    () => flash("Kopyalanamadı")
  );
}
function flash(msg){ statusEl.textContent = msg; setTimeout(() => { if(mod==="yeni") statusEl.textContent=""; }, 1500); }

function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---- AI çağrısı ----
function promptYap(alan){
  const sistem =
`Sen "4c1z"sin ve sahnede İKİ karakter var: ÇAVUŞ ve ZEYNEB. Fikirleri bu ikisi kendi aralarında SOHBET EDEREK üretir.
KARAKTERLER:
- ÇAVUŞ: Erkek, esmer. Çok detaycı, derinleri sever, bilgiye aşık. Zeyneb'e samimi ve sevecen seslenir: "yarenim", "Zeyneb'cim", "nazenim" gibi.
- ZEYNEB: Kapalı (başörtülü) bir hanım, doçent; o da bilgiye aşık, zarif ama tatlı tatlı laf sokar. Fikre girerken "hu hu, bi fikrim var Çavuş" tarzında samimi seslenir.
SOHBET: Samimi, sıcak, tatlı atışmalı; çok resmî DEĞİL. Karşılıklı 3-4 KISA replikte fikre varsınlar.
GÖREV: Dünyada ve Türkiye'de HENÜZ OLMAYAN, günlük hayatta herkesin (yaş/cinsiyet/meslek fark etmez) kullanabileceği BASİT ürünler icat etmek. Yöntem: ya sıfırdan tek basit fikir, ya da mevcut 2-3 sıradan nesneyi birleştirip yeni işe yarar bir şey.
KURALLAR: Yüksek teknoloji yok (en fazla yarı-teknolojik: basit sensör/mıknatıs/pil/yay/ısı olabilir). Karmaşık olmasın, 10 saniyede anlaşılsın. Bugünkü ucuz malzemeyle üretilebilsin. Hayal/bilimkurgu yok. Her fikir "vay be, bu neden benim aklıma gelmedi?" dedirtecek kadar basit ama akıllı olmalı; sıradan veya zaten var olan şeyleri ELE.
ÇIKTI: SADECE geçerli bir JSON dizisi döndür. Markdown yok, açıklama yok, başka metin yok. Şema (her alan Türkçe ve dolu, "diyalog" Çavuş ile Zeyneb'in o fikre varan sohbeti):
[{"isim":"","ne":"tek cümle","neyden":"sıfırdan mı yoksa hangi 2-3 nesnenin birleşimi","derde":"çözdüğü günlük sorun","nedenYok":"bu kadar basitse neden hâlâ icat edilmemiş","vayBe":"insanları neden şaşırtır","diyalog":[{"kim":"Zeyneb","soz":"..."},{"kim":"Çavuş","soz":"..."}]}]`;

  const alanStr = alan ? `Alan/tema: ${alan}.` : `Alan: SINIRSIZ — her alandan karışık, birbirinden bağımsız.`;
  const tekrar = uretilmisIsimler.length ? ` Şu isimleri ve benzerlerini TEKRARLAMA: ${uretilmisIsimler.slice(0,40).join(", ")}.` : "";
  const kullanici = `${alanStr} 3 adet birbirinden tamamen farklı, özgün fikir üret. Cesur ve yaratıcı ol.${tekrar}`;
  return { sistem, kullanici };
}

function jsonAyikla(txt){
  if(!txt) return null;
  let t = txt.replace(/```json/gi,"").replace(/```/g,"").trim();
  const i = t.indexOf("[");
  if(i === -1) return null;
  t = t.slice(i);
  // 1) tam diziyi dene
  const j = t.lastIndexOf("]");
  if(j > 0){
    try{
      const arr = JSON.parse(t.slice(0, j+1));
      if(Array.isArray(arr)){ const ok = arr.filter(x => x && x.isim); if(ok.length) return ok; }
    }catch(e){}
  }
  // 2) kurtarma: cevap yarıda kesilmişse dengeli {} taramasıyla tam kartları al
  const out = [];
  let derinlik = 0, bas = -1;
  for(let k = 0; k < t.length; k++){
    if(t[k] === "{"){ if(derinlik === 0) bas = k; derinlik++; }
    else if(t[k] === "}"){ derinlik--; if(derinlik === 0 && bas !== -1){
      try{ const o = JSON.parse(t.slice(bas, k+1)); if(o && o.isim) out.push(o); }catch(e){}
      bas = -1;
    }}
  }
  return out.length ? out : null;
}

async function cagir(alan){
  const { sistem, kullanici } = promptYap(alan);
  const body = {
    messages: [
      { role: "system", content: sistem },
      { role: "user", content: kullanici }
    ],
    model: "openai",
    seed: Math.floor(Math.random() * 1e9),
    referrer: location.hostname || "4c1z"
  };
  const ctrl = new AbortController();
  const to = setTimeout(() => ctrl.abort(), 45000);
  try{
    const r = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      signal: ctrl.signal
    });
    if(!r.ok){ const e = new Error("HTTP " + r.status); e.status = r.status; throw e; }
    return await r.text();
  } finally { clearTimeout(to); }
}

let calisiyor = false;
async function uret(){
  if(calisiyor) return;
  if(mod !== "yeni") setMod("yeni");
  calisiyor = true;
  $("#gen").disabled = true;
  out.innerHTML = "";

  const alan = alanInput.value.trim();
  const mesajlar = ["Çavuş ve Zeyneb istişare ediyor…","Çavuş sıradan fikirleri eliyor…","Zeyneb \"vay be\" diyor…","Birleştiriyor, icat ediyor…"];
  let mi = 0;
  statusEl.innerHTML = `<span class="spin"></span>${mesajlar[0]}`;
  const dongu = setInterval(() => { mi=(mi+1)%mesajlar.length; statusEl.innerHTML = `<span class="spin"></span>${mesajlar[mi]}`; }, 2200);

  let fikirler = null, hata = null;
  for(let deneme = 1; deneme <= 3 && !fikirler; deneme++){
    let limit = false;
    try{
      const txt = await cagir(alan);
      fikirler = jsonAyikla(txt);
      if(!fikirler) hata = "Cevap okunamadı";
    }catch(e){
      limit = e.status === 429;
      hata = e.name === "AbortError" ? "Süre doldu" : (limit ? "Servis yoğun (429)" : (e.message || "Bağlantı hatası"));
    }
    if(!fikirler && deneme < 3){
      clearInterval(dongu);
      // Anonim ücretsiz tier ~15 sn/istek; 429'da o pencereyi bekle
      for(let bekle = limit ? 16 : Math.ceil(deneme * 1.5); bekle > 0; bekle--){
        statusEl.innerHTML = `<span class="spin"></span>Ücretsiz servis yoğun, ${bekle} sn sonra tekrar deniyor…`;
        await new Promise(res => setTimeout(res, 1000));
      }
    }
  }

  clearInterval(dongu);
  calisiyor = false;
  $("#gen").disabled = false;

  if(fikirler && fikirler.length){
    sonUretilen = fikirler;
    fikirler.forEach(f => { if(f.isim) uretilmisIsimler.push(f.isim); });
    if(uretilmisIsimler.length > 80) uretilmisIsimler = uretilmisIsimler.slice(-80);
    statusEl.textContent = "";
    cizFikirler(fikirler);
  }else{
    statusEl.innerHTML = `Ücretsiz servis şu an çok yoğun (${escapeHtml(hata||"hata")}). 15-20 sn bekleyip tekrar dene.`;
    const b = document.createElement("button");
    b.className = "retry"; b.textContent = "Tekrar dene";
    b.addEventListener("click", uret);
    out.innerHTML = ""; out.appendChild(b);
  }
}

$("#gen").addEventListener("click", uret);

// init
favleriKaydet(favleriYukle());
cizFikirler([]);
</script>
</body>
</html>
