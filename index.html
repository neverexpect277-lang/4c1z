<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f7f3ea" />
<link rel="manifest" href="/manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="4c1z" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<title>4c1z</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <header>
    <h1>4c1z</h1>
    <p>Dünyada ve Türkiye'de olmayan, herkesin kullanacağı yeni ürün fikirleri</p>
  </header>

  <div class="panel">
    <label class="tt" for="alan">Hangi alan? (boş = SINIRSIZ, her alandan karışık)</label>
    <div class="inrow">
      <input id="alan" placeholder="örn. mutfak, araba, çocuk… ya da boş bırak" autocomplete="off" />
      <button class="clearx" id="clear" title="Temizle">✕</button>
    </div>
    <div class="chips" id="chips">
      <span class="chip sinirsiz" data-v="">Sınırsız</span>
      <span class="chip" data-v="mutfak">Mutfak</span>
      <span class="chip" data-v="banyo">Banyo</span>
      <span class="chip" data-v="çanta / cep">Çanta</span>
      <span class="chip" data-v="araba">Araba</span>
      <span class="chip" data-v="çocuk">Çocuk</span>
      <span class="chip" data-v="yaşlılar">Yaşlı</span>
      <span class="chip" data-v="sokak / dışarı">Sokak</span>
      <span class="chip" data-v="ev">Ev</span>
      <span class="chip" data-v="ofis / okul">Ofis</span>
      <span class="chip" data-v="bahçe / balkon">Bahçe</span>
      <span class="chip" data-v="evcil hayvan">Evcil</span>
    </div>
    <label class="tt kt" for="kaynak">Kaynak (isteğe bağlı) — not / belge / ürün açıklaması yapıştır, fikirler buna dayansın</label>
    <textarea id="kaynak" class="kaynak" rows="3" placeholder="örn. ürün notların, bir sorun açıklaması, pazar bilgisi… ya da bir https:// linki yapıştır → 🔗 Linki çek"></textarea>
    <button class="cekurl" id="cekUrl" type="button">🔗 Linki çek (URL → metin)</button>
    <div class="temalar" id="temalar"></div>
    <button class="temakaydet" id="temaKaydet" type="button">Bu ayarı tema olarak kaydet</button>
    <div class="temaform" id="temaForm" hidden>
      <input id="temaAd" class="temaad-input" type="text" placeholder="Tema adı…" autocomplete="off" />
      <button class="temaonay" id="temaOnay" type="button">Kaydet</button>
      <button class="temaiptal" id="temaIptal" type="button" aria-label="İptal">✕</button>
    </div>
    <div id="akis"></div>
    <button class="gen" id="gen">Fikir Üret</button>
  </div>

  <div class="tabs">
    <div class="tab on" id="tabYeni">Yeni Fikirler</div>
    <div class="tab" id="tabKayit">Kayıtlılar (<span id="kayitSay">0</span>)</div>
  </div>

  <div class="status" id="status"></div>
  <div class="onerilenBaslik" id="onerilenBaslik" hidden>✦ Önerilen Fikirler <span id="onerilenSay"></span></div>
  <div id="out"></div>
</div>

<div class="selamModal" id="selamModal" hidden>
  <div class="selamKart">
    <div class="besmele">﷽</div>
    <p class="selamMetin" id="selamMetin"></p>
    <span class="selamImza">— Çavuş</span>
    <button class="selamBtn" id="selamKapat">Ve Aleyküm Selâm</button>
  </div>
</div>

<script src="prompt.js"></script>
<script src="app.js"></script>
</body>
</html>
